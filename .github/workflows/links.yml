name: Links

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,429
            --max-concurrency 8
            --retry-wait-time 5
            --exclude-mail
            --include-fragments
            ./**/*.md
            ./**/*.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
